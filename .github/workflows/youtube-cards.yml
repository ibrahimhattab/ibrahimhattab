name: GitHub Readme YouTube Cards
on:
  schedule:
    # Runs every 24 hours
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: "YOUTUBE-CARDS"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UCv2MD3cfPXuzpgFPL0gSOgw"
