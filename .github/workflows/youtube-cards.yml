name: GitHub Readme YouTube Cards
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate YouTube Cards
        uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          # Your uploads playlist ID (Your Channel ID with 'UU' instead of 'UC')
          playlist_id: UULFv2MD3cfPXuzpgFPL0gSOgw
          comment_tag_name: YOUTUBE-CARDS
          youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}
          show_duration: true

      - name: Update subscriber count in README
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sSf "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=UCv2MD3cfPXuzpgFPL0gSOgw&key=${YOUTUBE_API_KEY}")
          COUNT=$(echo "$RESPONSE" | jq -r '.items[0].statistics.subscriberCount')
          FORMATTED=$(python3 -c "
          c = int('$COUNT')
          if c >= 1_000_000:
              s = f'{c/1_000_000:.1f}M'.replace('.0M', 'M')
          elif c >= 1_000:
              s = f'{c//1_000}k'
          else:
              s = str(c)
          print(s)
          ")
          sed -i "s|[^<]*|${FORMATTED}|" README.md

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "docs(readme): Update YouTube content"
          add: "README.md"
          author_name: "GitHub Actions"
          author_email: "41898282+github-actions[bot]@users.noreply.github.com"
